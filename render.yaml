services:
  - type: web
    name: instapost-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://insta-post-mauve.vercel.app
